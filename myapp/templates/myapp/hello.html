<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <title>Ransomware Victim Location Information Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        .page-title {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .page-description {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: #444;
            font-size: 16px;
        }

        #map {
            height: 700px;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1 class="page-title">Ransomware Victim Location Information Map</h1>
    <p class="page-description">
        Visualization of company names, locations, and phone numbers collected from the dark web
    </p>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        async function fetchData() {
            try {
                const response = await fetch('{% static "myapp/company_locations.json" %}');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                return await response.json();
            } catch (error) {
                console.error('Error fetching JSON data:', error);
                return [];
            }
        }

        async function initMap() {
            const data = await fetchData();

            const map = L.map('map').setView([20.0, 0.0], 2);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19
            }).addTo(map);

            data.forEach(function(location) {
                const marker = L.marker([location.latitude, location.longitude]).addTo(map);

                marker.bindPopup(
                    `<b>${location.company}</b><br>` +
                    `Phone: ${location.phonenumber || 'N/A'}`
                );
            });
        }

        initMap();
    </script>
</body>
</html>
